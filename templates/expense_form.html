{% extends "base.html" %}

{% block title %}{{ form_title }} — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">{{ form_title }}</h1>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ form_action }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" placeholder="0.00" step="0.01" min="0.01"
                           value="{{ expense.amount if expense.amount is defined else '' }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category"
                           class="form-input" placeholder="Food, Transport, Utilities…"
                           value="{{ expense.category if expense.category is defined else '' }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="Optional note"
                           value="{{ expense.description if expense.description is defined and expense.description else '' }}">
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ expense.date if expense.date is defined else '' }}"
                           required>
                </div>
                <button type="submit" class="btn-submit">{{ submit_label }}</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel and go back to profile</a>
        </p>

    </div>
</section>

{% endblock %}
